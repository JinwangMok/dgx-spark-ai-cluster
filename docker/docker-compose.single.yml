# Single DGX Spark Setup — LLM + faster-whisper + nginx
# Usage: docker compose -f docker-compose.single.yml up -d
#
# Default: Gemma 4 26B-A4B MoE (FP8) — same as 2-node cluster
# With --31b flag in setup-single.sh: Gemma-4-31B-IT-NVFP4 (modelopt)
#
# Model-specific settings are controlled via environment variables
# set by setup-single.sh before running docker compose.

services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:gemma4-cu130}
    container_name: ${VLLM_CONTAINER_NAME:-dgx-vllm}
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${MODEL_CACHE_DIR:-/data/models}:/data/models
    environment:
      - HF_HOME=/data/models
    env_file:
      - ../.env.token
    command: >
      --model ${MODEL_ID:-google/gemma-4-26B-A4B-it}
      --port 8000
      --host 0.0.0.0
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.70}
      --dtype auto
      --quantization ${VLLM_QUANTIZATION:-fp8}
      ${VLLM_QUANT_EXTRA_ARGS:---kv-cache-dtype fp8 --load-format safetensors}
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --enable-prefix-caching
      --enable-chunked-prefill
      --max-num-seqs 4
      --max-num-batched-tokens 8192
      --max-model-len 262144
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 3600s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile
    container_name: dgx-whisper
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ${WHISPER_CACHE_DIR:-/data/models/whisper}:/data/models/whisper
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - WHISPER_PORT=9000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  voxcpm:
    image: ${VOXCPM_IMAGE:-jinwangmok/voxcpm-api-server:latest}
    container_name: dgx-voxcpm
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - ${VOXCPM_CACHE_DIR:-/data/models/voxcpm}:/data/models/voxcpm
    environment:
      - VOXCPM_MODEL=${VOXCPM_MODEL:-openbmb/VoxCPM2}
      - VOXCPM_PORT=9100
      - VOXCPM_CACHE_DIR=/data/models/voxcpm
      - HF_HOME=/data/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  nginx:
    image: nginx:stable
    container_name: dgx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../config/nginx-single.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm:
        condition: service_started
      whisper:
        condition: service_started
      voxcpm:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
