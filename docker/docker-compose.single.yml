# Single DGX Spark Setup — Gemma-4-31B-IT-NVFP4 + faster-whisper + nginx
# Usage: docker compose -f docker-compose.single.yml up -d
#
# This is a standalone compose file for serving nvidia/Gemma-4-31B-IT-NVFP4
# (NVFP4 quantized, multimodal) and faster-whisper on a single DGX Spark node.
# It is separate from the 2-node cluster compose files (docker-compose.node.yml + lb.yml).

services:
  vllm:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:gemma4-cu130}
    container_name: gemma4-31b-vllm
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${MODEL_CACHE_DIR:-/data/models}:/data/models
    environment:
      - HF_HOME=/data/models
    env_file:
      - ../.env.token
    command: >
      --model nvidia/Gemma-4-31B-IT-NVFP4
      --port 8000
      --host 0.0.0.0
      --gpu-memory-utilization ${VLLM_GPU_MEMORY_UTILIZATION:-0.85}
      --dtype auto
      --quantization modelopt
      --tensor-parallel-size 1
      --enable-auto-tool-choice
      --tool-call-parser gemma4
      --reasoning-parser gemma4
      --enable-prefix-caching
      --enable-chunked-prefill
      --max-num-seqs 4
      --max-num-batched-tokens 8192
      --max-model-len 262144
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 3600s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  whisper:
    build:
      context: ./whisper
      dockerfile: Dockerfile
    container_name: dgx-whisper
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ${WHISPER_CACHE_DIR:-/data/models/whisper}:/data/models/whisper
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-large-v3-turbo}
      - WHISPER_PORT=9000
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  nginx:
    image: nginx:stable
    container_name: dgx-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../config/nginx-single.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      vllm:
        condition: service_started
      whisper:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
